<!DOCTYPE html>
<html>
<head>
  <title>Luas Segitiga</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
    }

    input {
      margin: 5px;
      padding: 5px;
    }

    button {
      padding: 5px 10px;
      cursor: pointer;
    }

    #hasil {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h2>Hitung Luas Segitiga</h2>

  <input type="number" id="alas" placeholder="Masukkan alas"><br>
  <input type="number" id="tinggi" placeholder="Masukkan tinggi"><br>

  <button onclick="hitungLuas()">Hitung</button>

  <div id="hasil"></div>

  <script>
    function hitungLuas() {
      let alas = document.getElementById("alas").value;
      let tinggi = document.getElementById("tinggi").value;

      let luas = 0.5 * alas * tinggi;

      document.getElementById("hasil").innerText =
        "Luas segitiga adalah: " + luas;
    }
  </script>

</body>
</html>
